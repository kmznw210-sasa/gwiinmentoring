<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멘토링 스페이스</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: "Pretendard Variable", Pretendard, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-64 bg-white border-b md:border-b-0 md:border-r border-gray-200 flex flex-col shrink-0">
        <div class="p-5 border-b border-gray-100 flex items-center justify-between">
            <div>
                <h1 class="text-lg font-bold text-gray-900 flex items-center gap-1.5">
                    <span class="text-blue-600">🚀</span> 멘토링 룸
                </h1>
                <p class="text-[11px] text-gray-400 mt-0.5">실시간 동기화 스페이스</p>
            </div>
            <span class="inline-flex md:hidden items-center px-1.5 py-0.5 rounded-full text-[10px] font-medium bg-green-100 text-green-700 animate-pulse">LIVE</span>
        </div>

        <nav class="p-3 space-y-1 flex-1">
            <button id="menuPresentation" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg bg-blue-50 text-blue-600 transition cursor-pointer group">
                <span class="text-lg group-hover:scale-110 transition duration-150">📊</span>
                <span>발표자료 페이지</span>
            </button>
            <button id="menuQna" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 transition cursor-pointer group">
                <span class="text-lg group-hover:scale-110 transition duration-150">💬</span>
                <span class="flex-1 text-left">질의응답 페이지</span>
                <span id="sidebarCount" class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-semibold">0</span>
            </button>
        </nav>

        <div class="p-4 bg-gray-50 border-t border-gray-100 hidden md:block">
            <label class="block text-[11px] font-semibold text-gray-400 mb-1">📄 관리자 PDF 동기화 URL</label>
            <div class="flex gap-1.5">
                <input type="text" id="pdfUrlInput" placeholder="PDF 링크 입력" 
                       class="bg-white border border-gray-300 text-xs rounded px-2 py-1.5 w-full focus:outline-blue-500 text-gray-600">
                <button id="updatePdfBtn" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-2 py-1.5 rounded shrink-0 cursor-pointer transition">
                    적용
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-gray-50 overflow-hidden">
        
        <section id="pagePresentation" class="flex-1 flex flex-col p-4 md:p-6">
            <div class="mb-4 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">📊 발표자료 스크린</h2>
                    <p class="text-xs text-gray-500 mt-1">멘토가 공유한 발표자료를 확인하는 페이지입니다.</p>
                </div>
                <span class="hidden md:inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700 animate-pulse">LIVE 동기화 중</span>
            </div>
            
            <div class="flex-1 bg-white border border-gray-200 rounded-xl shadow-xs overflow-hidden flex items-center justify-center p-3 relative min-h-[450px]">
                <div id="pdfPlaceholder" class="text-center p-4">
                    <p class="text-gray-400 text-sm font-medium">등록된 발표자료가 없습니다.</p>
                    <p class="text-gray-400 text-xs mt-1">사이드바 하단에 PDF 주소를 입력하고 적용을 눌러보세요.</p>
                </div>
                <iframe id="pdfViewer" class="w-full h-full rounded-lg border-0 hidden" allow="autoplay"></iframe>
            </div>
        </section>

        <section id="pageQna" class="flex-1 flex flex-col p-4 md:p-6 hidden overflow-y-auto">
            <div class="mb-6">
                <h2 class="text-xl font-bold text-gray-900">💬 실시간 Q&A 방명록</h2>
                <p class="text-xs text-gray-500 mt-1">강의나 발표 중 궁금한 점을 언제든 남겨주세요.</p>
            </div>

            <div class="max-w-3xl w-full mx-auto space-y-6">
                <div class="bg-white p-5 rounded-xl shadow-xs border border-gray-200">
                    <h3 class="text-sm font-bold mb-3 text-gray-700 flex items-center gap-1">🙋‍♂️ 새로운 질문 남기기</h3>
                    <form id="questionForm" class="space-y-3">
                        <div>
                            <textarea id="content" required rows="3" maxlength="300" placeholder="멘토에게 궁금한 내용을 적어주세요. (최대 300자)"
                                class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none"></textarea>
                            <div class="text-right text-[11px] text-gray-400 mt-1" id="charCounter">0 / 300자</div>
                        </div>
                        <button type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm py-2.5 px-4 rounded-lg transition duration-200 cursor-pointer shadow-xs">
                            질문 등록하기
                        </button>
                    </form>
                </div>

                <div class="space-y-3">
                    <h3 class="text-sm font-bold text-gray-700 flex items-center gap-2">
                        📋 질문 목록
                    </h3>
                    <div id="questionList" class="space-y-3">
                        <p class="text-center text-sm text-gray-400 py-8">질문을 불러오는 중입니다...</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // 1. Supabase API 설정
        const SUPABASE_URL = 'https://oknuuepfxtaavxnareat.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_IpkgAw7waQDuoU_yhl6Lvg_HAtOTvdP';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // UI 제어 DOM
        const menuPresentation = document.getElementById('menuPresentation');
        const menuQna = document.getElementById('menuQna');
        const pagePresentation = document.getElementById('pagePresentation');
        const pageQna = document.getElementById('pageQna');

        // 기능 관련 DOM
        const questionForm = document.getElementById('questionForm');
        const questionList = document.getElementById('questionList');
        const sidebarCount = document.getElementById('sidebarCount');
        const textareaContent = document.getElementById('content');
        const charCounter = document.getElementById('charCounter');
        
        const pdfUrlInput = document.getElementById('pdfUrlInput');
        const updatePdfBtn = document.getElementById('updatePdfBtn');
        const pdfViewer = document.getElementById('pdfViewer');
        const pdfPlaceholder = document.getElementById('pdfPlaceholder');

        // ================= [ 핵심 기능: 페이지 탭 전환 ] =================
        function switchPage(target) {
            if (target === 'presentation') {
                // 발표자료 활성화
                pagePresentation.classList.remove('hidden');
                pageQna.classList.add('hidden');
                // 버튼 스타일 전환
                menuPresentation.className = "w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg bg-blue-50 text-blue-600 transition cursor-pointer group";
                menuQna.className = "w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 transition cursor-pointer group";
            } else if (target === 'qna') {
                // 질의응답 활성화
                pagePresentation.classList.add('hidden');
                pageQna.classList.remove('hidden');
                // 버튼 스타일 전환
                menuPresentation.className = "w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 transition cursor-pointer group";
                menuQna.className = "w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg bg-blue-50 text-blue-600 transition cursor-pointer group";
            }
        }

        menuPresentation.addEventListener('click', () => switchPage('presentation'));
        menuQna.addEventListener('click', () => switchPage('qna'));


        // ================= [ Q&A 게시판 로직 ] =================
        textareaContent.addEventListener('input', () => {
            charCounter.textContent = `${textareaContent.value.length} / 300자`;
        });

        async function fetchQuestions() {
            try {
                const { data, error } = await supabaseClient
                    .from('questions')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                renderQuestions(data);
            } catch (error) {
                console.error('로드 실패:', error.message);
                questionList.innerHTML = `<p class="text-center text-sm text-red-500 py-8">오류가 발생했습니다.</p>`;
            }
        }

        function renderQuestions(questions) {
            sidebarCount.textContent = questions.length;

            if (questions.length === 0) {
                questionList.innerHTML = `<p class="text-center text-sm text-gray-400 py-8">등록된 질문이 없습니다.</p>`;
                return;
            }

            questionList.innerHTML = questions.map(q => {
                const date = new Date(q.created_at).toLocaleString('ko-KR', { 
                    timeZone: 'Asia/Seoul', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                
                const answerHTML = q.answer 
                    ? `<div class="mt-2.5 p-3 bg-blue-50/60 border-l-2 border-blue-500 rounded-r-lg">
                        <span class="text-[10px] bg-blue-600 text-white px-1.5 py-0.2 rounded font-medium inline-block mb-1">멘토 답변</span>
                        <p class="text-gray-700 text-xs md:text-sm whitespace-pre-wrap leading-relaxed">${q.answer}</p>
                       </div>`
                    : `<div class="mt-2.5 p-2 bg-gray-50/80 rounded border border-dashed border-gray-200 text-center">
                        <p class="text-[11px] text-gray-400">💡 답변을 기다리고 있습니다.</p>
                       </div>`;

                return `
                    <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-[0_1px_2px_rgba(0,0,0,0.03)]">
                        <div class="mb-1"><span class="text-[11px] text-gray-400">${date}</span></div>
                        <p class="text-gray-800 text-sm md:text-base font-normal whitespace-pre-wrap leading-relaxed">${escapeHtml(q.content)}</p>
                        ${answerHTML}
                    </div>
                `;
            }).join('');
        }

        questionForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = textareaContent.value.trim();
            try {
                const { error } = await supabaseClient.from('questions').insert([{ content }]);
                if (error) throw error;
                questionForm.reset();
                charCounter.textContent = '0 / 300자';
            } catch (error) {
                alert('질문 등록 실패: ' + error.message);
            }
        });

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // ================= [ PDF 실시간 연동 로직 ] =================
        function loadPdf(url) {
            if(!url) return;
            pdfPlaceholder.classList.add('hidden');
            pdfViewer.classList.remove('hidden');
            pdfViewer.src = url;
        }

        updatePdfBtn.addEventListener('click', () => {
            const url = pdfUrlInput.value.trim();
            if(url) {
                localStorage.setItem('current_presentation_pdf', url);
                loadPdf(url);
            }
        });

        // ================= [ 실시간 DB 구독 ] =================
        function subscribeRealtime() {
            supabaseClient
                .channel('schema-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'questions' }, () => {
                    fetchQuestions();
                })
                .subscribe();
        }

        // 초기화 실행
        fetchQuestions();
        subscribeRealtime();

        // 🛠️ [사전 로드 기능 적용 완료] 
        // 1. 같은 폴더에 넣어둔 presentation.pdf를 기본 경로로 설정합니다.
        const DEFAULT_PDF = './presentation.pdf'; 

        // 2. 브라우저 저장 세션(localStorage) 확인 후 우선 로드
        const savedPdf = localStorage.getItem('current_presentation_pdf');
        if (savedPdf) {
            pdfUrlInput.value = savedPdf;
            loadPdf(savedPdf);
        } else {
            // 저장된 임시 세션이 없다면 사전에 폴더에 같이 올린 기본 PDF를 바로 로드합니다.
            pdfUrlInput.value = DEFAULT_PDF;
            loadPdf(DEFAULT_PDF);
        }
    </script>
</body>
</html>
