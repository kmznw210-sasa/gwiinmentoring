<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라이브 스페이스</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: "Pretendard Variable", Pretendard, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-64 bg-white border-b md:border-b-0 md:border-r border-gray-200 flex flex-col shrink-0">
        <div class="p-5 border-b border-gray-100 flex items-center justify-between">
            <div>
                <h1 class="text-lg font-bold text-gray-900 flex items-center gap-1.5">
                    <span class="text-blue-600">🚀</span> 라이브 룸
                </h1>
                <p class="text-[11px] text-gray-400 mt-0.5">실시간 동기화 스페이스</p>
            </div>
            <span class="inline-flex md:hidden items-center px-1.5 py-0.5 rounded-full text-[10px] font-medium bg-green-100 text-green-700 animate-pulse">LIVE</span>
        </div>

        <nav class="p-3 space-y-1 flex-1">
            <button id="menuQna" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg bg-blue-50 text-blue-600 transition cursor-pointer group">
                <span class="text-lg group-hover:scale-110 transition duration-150">💬</span>
                <span class="flex-1 text-left">질의응답 페이지</span>
                <span id="sidebarCount" class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-semibold">0</span>
            </button>
            <button id="menuPresentation" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 transition cursor-pointer group">
                <span class="text-lg group-hover:scale-110 transition duration-150">📊</span>
                <span>발표자료 페이지</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col bg-gray-50 overflow-hidden">
        
        <section id="pageQna" class="flex-1 flex flex-col p-4 md:p-6 overflow-y-auto">
            <div class="mb-6">
                <h2 class="text-xl font-bold text-gray-900">💬 실시간 Q&A 방명록</h2>
                <p class="text-xs text-gray-500 mt-1">강의나 발표 중 궁금한 점을 언제든 남겨주세요.</p>
            </div>

            <div class="max-w-3xl w-full mx-auto space-y-6">
                <div class="bg-white p-5 rounded-xl shadow-xs border border-gray-200">
                    <h3 class="text-sm font-bold mb-3 text-gray-700 flex items-center gap-1">🙋‍♂️ 새로운 질문 남기기</h3>
                    <form id="questionForm" class="space-y-3">
                        <div>
                            <textarea id="content" required rows="3" maxlength="300" placeholder="물어보고 싶은 내용을 자유롭게 적어주세요!!"
                                class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none"></textarea>
                            <div class="text-right text-[11px] text-gray-400 mt-1" id="charCounter">0 / 300자</div>
                        </div>
                        <button type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm py-2.5 px-4 rounded-lg transition duration-200 cursor-pointer shadow-xs">
                            질문 등록하기
                        </button>
                    </form>
                </div>

                <div class="space-y-3">
                    <h3 class="text-sm font-bold text-gray-700 flex items-center gap-2">📋 Q&A</h3>
                    <div id="questionList" class="space-y-3">
                        <p class="text-center text-sm text-gray-400 py-8">질문을 불러오는 중입니다...</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="pagePresentation" class="flex-1 flex flex-col p-4 md:p-6 hidden">
            <div class="mb-4 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">📊 발표자료 스크린</h2>
                    <p class="text-xs text-gray-500 mt-1">공유된 발표자료를 확인하는 페이지입니다.</p>
                </div>
                <span class="hidden md:inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700 animate-pulse">LIVE 동기화 중</span>
            </div>
            
            <div class="flex-1 bg-white border border-gray-200 rounded-xl shadow-xs overflow-hidden flex items-center justify-center p-3 relative min-h-[450px]">
                <div id="pdfPlaceholder" class="text-center p-4">
                    <p class="text-gray-400 text-sm font-medium">등록된 발표자료가 없습니다.</p>
                </div>
                <object id="pdfViewer" type="application/pdf" class="w-full h-full rounded-lg border-0 hidden">
                    <div class="text-center p-4">
                        <p class="text-gray-500 text-sm mb-2">이 브라우저 환경에서는 자료를 바로 열 수 없습니다.</p>
                        <a id="pdfDownloadLink" href="#" target="_blank" class="inline-block bg-blue-600 text-white text-xs px-3 py-2 rounded font-medium">새 창에서 PDF 보기</a>
                    </div>
                </object>
            </div>
        </section>

    </main>

    <script>
        const SUPABASE_URL = 'https://oknuuepfxtaavxnareat.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_IpkgAw7waQDuoU_yhl6Lvg_HAtOTvdP';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const menuPresentation = document.getElementById('menuPresentation');
        const menuQna = document.getElementById('menuQna');
        const pagePresentation = document.getElementById('pagePresentation');
        const pageQna = document.getElementById('pageQna');

        const questionForm = document.getElementById('questionForm');
        const questionList = document.getElementById('questionList');
        const sidebarCount = document.getElementById('sidebarCount');
        const textareaContent = document.getElementById('content');
        const charCounter = document.getElementById('charCounter');
        
        const pdfViewer = document.getElementById('pdfViewer');
        const pdfPlaceholder = document.getElementById('pdfPlaceholder');
        const pdfDownloadLink = document.getElementById('pdfDownloadLink');

        let currentLoadedUrl = "";

        function switchPage(target) {
            if (target === 'presentation') {
                pagePresentation.classList.remove('hidden');
                pageQna.classList.add('hidden');
                menuPresentation.className = "w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg bg-blue-50 text-blue-600 transition duration-150 cursor-pointer group";
                menuQna.className = "w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 transition duration-150 cursor-pointer group";
            } else if (target === 'qna') {
                pagePresentation.classList.add('hidden');
                pageQna.classList.remove('hidden');
                menuPresentation.className = "w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 transition duration-150 cursor-pointer group";
                menuQna.className = "w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg bg-blue-50 text-blue-600 transition duration-150 cursor-pointer group";
            }
        }

        menuPresentation.addEventListener('click', () => switchPage('presentation'));
        menuQna.addEventListener('click', () => switchPage('qna'));

        textareaContent.addEventListener('input', () => {
            charCounter.textContent = `${textareaContent.value.length} / 300자`;
        });

        // 🚀 초기 로딩 최적화: 서버 측 정렬 및 로드 속도 단축
        async function fetchQuestions() {
            try {
                const { data, error } = await supabaseClient
                    .from('questions')
                    .select('*')
                    .order('id', { ascending: true }); // 등록 시간 기준으로 기본 일차 정렬

                if (error) throw error;
                
                // 🚀 가상 정렬 매핑: 뒤죽박죽인 id 값 대신 1번부터 이쁘게 카운팅
                const processedData = data.map((item, index) => {
                    return {
                        ...item,
                        displayNumber: index + 1
                    };
                });

                // 답변 완료 카드가 아래로 밀리도록 하고, 각각 최신 순번대로 최종 배치
                const sortedData = processedData.sort((a, b) => {
                    const isCompleteA = !!a.complete || (!!a.answer && String(a.answer).trim() !== '');
                    const isCompleteB = !!b.complete || (!!b.answer && String(b.answer).trim() !== '');

                    if (isCompleteA !== isCompleteB) {
                        return isCompleteA ? 1 : -1; 
                    }
                    return b.displayNumber - a.displayNumber; 
                });

                renderQuestions(sortedData);
            } catch (error) {
                console.error('로드 실패:', error.message);
                questionList.innerHTML = `<p class="text-center text-sm text-red-500 py-8">질문을 불러오지 못했습니다.<br>오류내용: ${error.message}</p>`;
            }
        }

        function renderQuestions(questions) {
            sidebarCount.textContent = Math.max(0, questions.length);

            if (questions.length === 0) {
                questionList.innerHTML = `<p class="text-center text-sm text-gray-400 py-8">등록된 질문이 없습니다.</p>`;
                return;
            }

            questionList.innerHTML = questions.map(q => {
                const date = new Date(q.created_at).toLocaleString('ko-KR', { 
                    timeZone: 'Asia/Seoul', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                
                const isEffectivelyComplete = !!q.complete || (!!q.answer && String(q.answer).trim() !== '');

                const boxStyles = isEffectivelyComplete
                    ? 'border-green-200 bg-green-50/20 shadow-[0_1px_3px_rgba(34,197,94,0.05)]'
                    : 'border-gray-200 bg-white shadow-[0_1px_2px_rgba(0,0,0,0.03)]';

                const statusBadge = isEffectivelyComplete
                    ? `<span class="text-[10px] bg-green-600 text-white px-2 py-0.5 rounded-full font-semibold">✅ 답변 완료</span>`
                    : `<span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-semibold">💡 답변 대기</span>`;

                let answerHTML = '';
                if (isEffectivelyComplete) {
                    answerHTML = `
                        <div class="mt-2.5 p-3 bg-green-50/60 border-l-2 border-green-500 rounded-r-lg">
                            <p class="text-gray-700 text-xs md:text-sm leading-relaxed font-medium">
                                ${q.answer ? q.answer : '🙌 현장에서 답변이 완료된 질문입니다.'}
                            </p>
                        </div>`;
                } else {
                    answerHTML = `
                        <div class="mt-2.5 p-2 bg-gray-50/80 rounded border border-dashed border-gray-200 text-center">
                            <p class="text-[11px] text-gray-400">💡 답변을 기다리고 있습니다.</p>
                        </div>`;
                }

                // 가상 순번인 q.displayNumber를 출력합니다.
                return `
                    <div class="p-4 rounded-xl border ${boxStyles} transition-all duration-300">
                        <div class="flex justify-between items-center mb-2">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded">#${q.displayNumber}</span>
                                <span class="text-[11px] text-gray-400">${date}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                ${statusBadge}
                            </div>
                        </div>
                        <p class="text-gray-800 text-sm md:text-base font-normal whitespace-pre-wrap leading-relaxed">${escapeHtml(q.content)}</p>
                        ${answerHTML}
                    </div>
                `;
            }).join('');
        }

        questionForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = textareaContent.value.trim();
            try {
                const { error } = await supabaseClient.from('questions').insert([{ content }]);
                if (error) throw error;
                questionForm.reset();
                charCounter.textContent = '0 / 300자';
            } catch (error) {
                alert('질문 등록 실패: ' + error.message);
            }
        });

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // PDF 뷰어 렌더러 함수
        function loadPdf(url) {
            if(!url || url === currentLoadedUrl) return;
            currentLoadedUrl = url;
            
            pdfPlaceholder.classList.add('hidden');
            pdfViewer.classList.remove('hidden');

            let fullUrl = url;
            if (url.startsWith('.')) {
                fullUrl = window.location.origin + window.location.pathname.replace('index.html', '') + url.replace('./', '');
            }
            
            pdfViewer.data = fullUrl;
            pdfDownloadLink.href = fullUrl;
        }

        // 🚀 PDF 핵심 안전장치: 구글 드라이브 주소 차단을 피하기 위해 깃허브 `./presentation.pdf` 강제 고정
        async function fetchSettings() {
            try {
                const { data, error } = await supabaseClient
                    .from('settings')
                    .select('pdf_url')
                    .eq('id', 1)
                    .single();
                
                if (error) throw error;
                
                // 구글 드라이브 주소가 기입되어 있거나 공백인 경우, 구글의 프레임 제한 정책 우회를 위해 깃허브 로컬 파일 최우선 적용
                if (data && data.pdf_url && data.pdf_url.startsWith('http') && !data.pdf_url.includes('drive.google.com')) {
                    loadPdf(data.pdf_url);
                } else {
                    loadPdf('./presentation.pdf');
                }
            } catch (e) {
                console.error("설정 데이터 연동 우회 -> 로컬 파일 바인딩 완료");
                loadPdf('./presentation.pdf');
            }
        }

        function subscribeRealtime() {
            supabaseClient
                .channel('questions-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'questions' }, () => {
                    fetchQuestions();
                })
                .subscribe();

            supabaseClient
                .channel('settings-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, () => {
                    fetchSettings();
                })
                .subscribe();
        }

        fetchQuestions();
        fetchSettings();
        subscribeRealtime();
    </script>
</body>
</html>
